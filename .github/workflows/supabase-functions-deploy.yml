name: Deploy Supabase Edge Functions

on:
  push:
    branches: [ "main" ]
    paths:
      - "supabase/functions/**"
  workflow_dispatch: {}

env:
  PROJECT_REF: rbenryjgtbrjvqvxbigq

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          for fn in \
            sitemap sitemap-artists sitemap-stories \
            locality-ssr event-ssr events-list-ssr merchant-ssr \
            artist-ssr venue-ssr page-ssr story-ssr \
            scrape-bookmyshow-events register-for-event; do
            echo "::group::Deploy $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF"
            echo "::endgroup::"
          done
